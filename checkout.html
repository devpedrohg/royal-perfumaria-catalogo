<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Royal Perfumaria</title>
    <link rel="stylesheet" href="checkout.css">
</head>
<body>
<header class="topo">
    <a href="index.html" class="logo">
        <img src="logoroyalcatalogo.png" alt="Royal Perfumaria">
    </a>

    <nav class="menu">
        <a href="index.html">Início</a>
        <a href="catalogo.html">Catálogo</a>
        <a href="catalogo.html">Masculinos</a>
        <a href="catalogo.html">Femininos</a>
    </nav>

    <div class="icones">

        <a href="catalogo.html" class="top-icon" aria-label="Buscar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="7"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        </a>

        <a href="https://instagram.com/royalperfumaria" target="_blank" class="top-icon" aria-label="Instagram">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="5"></rect>
                <circle cx="12" cy="12" r="4"></circle>
                <circle cx="17.5" cy="6.5" r="1"></circle>
            </svg>
        </a>

        <div class="icone-carrinho">
            <button class="btn-carrinho" type="button">
                <span class="contador-carrinho">0</span>

                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
            </button>

            <div class="dropdown-carrinho">
                <h3>Seu Carrinho</h3>
                <p>Carrinho vazio.</p>
            </div>
        </div>

    </div>
</header>

<main class="checkout-container">

    <section class="dados-cliente">
        <h2>Dados para entrega</h2>

        <input type="text" id="nome" placeholder="Nome completo *">
        <input type="tel" id="telefone" placeholder="WhatsApp *">
        <input type="text" id="cep" placeholder="CEP *">

        <div class="linha">
            <input type="text" id="endereco" placeholder="Endereço *">
            <input type="text" id="numero" placeholder="Número *">
        </div>

        <input type="text" id="bairro" placeholder="Bairro *">

        <div class="linha">
            <input type="text" id="cidade" placeholder="Cidade *">
            <input type="text" id="uf" placeholder="UF *">
        </div>

        <input type="text" id="complemento" placeholder="Complemento">

        <select id="pagamento">
            <option value="">Forma de pagamento *</option>
            <option value="PIX">PIX</option>
            <option value="Cartão">Cartão</option>
            <option value="Dinheiro">Dinheiro</option>
        </select>

        <textarea id="observacao" placeholder="Observações do pedido"></textarea>
    </section>

    <section class="resumo-pedido">
        <h2>Resumo do pedido</h2>

        <div id="listaCheckout"></div>

        <div class="total-box">
            <span>Total</span>
            <strong id="totalCheckout">R$ 0,00</strong>
        </div>

        <button id="btnFinalizar">
            Finalizar pelo WhatsApp
        </button>
    </section>

</main>

<script src="checkout.js"></script>
</body>
</html>
