    <!DOCTYPE html>
    <html lang="pt-BR">

    <head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Catálogo | Royal Perfumaria</title>

    <link rel="stylesheet" href="catalogo.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    </head>

    <body>

    <header class="topo">

        <a href="index.html" class="logo">
            <img src="logoroyalcatalogo.png" alt="Royal Perfumaria">
        </a>

        <nav class="menu">

            <a href="index.html">Início</a>
            <a href="#">Masculinos</a>
            <a href="#">Femininos</a>
            <a href="#">Promoções</a>

        </nav>

    <div class="icones">

        <a href="#" class="top-icon" aria-label="Buscar">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        </a>

        <a href="https://instagram.com/royalperfumaria" target="_blank" class="top-icon" aria-label="Instagram">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="5" ry="5"></rect>
            <circle cx="12" cy="12" r="4"></circle>
            <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"></circle>
        </svg>
        </a>

    <div class="icone-carrinho">

        <button class="btn-carrinho">

            <span class="contador-carrinho">0</span>

            <svg xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24">

                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>

                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>

            </svg>

        </button>

        <div class="dropdown-carrinho">

    </header>

    <section class="hero-catalogo">
        <img src="../imagens/hero-royal.png" alt="Royal Perfumaria">
    </section>


            <div class="controles-catalogo">
            </div>
            
        <div class="campo-busca-catalogo">
            <input type="text" id="campoBusca" placeholder="Buscar produto...">
            <button id="btnBuscar">Buscar</button>
        </div>

        <div class="linha-filtros">

            <div class="filtros-categorias">
                <button class="filtro ativo" data-categoria="todos">Todos</button>
                <button class="filtro" data-categoria="feminino">Femininos</button>
                <button class="filtro" data-categoria="masculino">Masculinos</button>
                <button class="filtro" data-categoria="body-splash">Body Splash</button>
                <button class="filtro" data-categoria="creme-corporal">Cremes</button>
                <button class="filtro" data-categoria="spray">Sprays</button>
                <button class="filtro" data-categoria="unissex">Unissex</button>
            </div>

            <select id="ordenarProdutos">
                <option value="padrao">Ordenar</option>
                <option value="menor-preco">Menor preço</option>

                <option value="maior-preco">Maior preço</option>
                <option value="az">A-Z</option>
                <option value="za">Z-A</option>
            </select>
            
        </div>
 
        <p id="quantidadeProdutos">
            todos os produtos</p>

        <div class="grid-produtos" id="gridProdutos"></div>

        <script src="produtos.js"></script>
        <script src="catalogo.js"></script>
        
    </body>
    </html>
