<script>
  let slideAtual = 0;

  const slides = document.querySelectorAll(".slide");
  const dots = document.querySelectorAll(".dot");

  function mostrarSlide(index) {
    slides.forEach(slide => slide.classList.remove("ativo"));
    dots.forEach(dot => dot.classList.remove("ativo"));

    slides[index].classList.add("ativo");
    dots[index].classList.add("ativo");
  }

  function mudarSlide(direcao) {
    slideAtual += direcao;

    if (slideAtual < 0) {
      slideAtual = slides.length - 1;
    }

    if (slideAtual >= slides.length) {
      slideAtual = 0;
    }

    mostrarSlide(slideAtual);
  }

  function irParaSlide(index) {
    slideAtual = index;
    mostrarSlide(slideAtual);
  }

  setInterval(() => {
    mudarSlide(1);
  }, 5000);

  function salvarCep() {
    const cepInput = document.getElementById("cepInput");
    const cepTexto = document.getElementById("cepTexto");

    if (cepInput.value.trim() === "") {
      alert("Digite um CEP válido.");
      return;
    }

    cepTexto.textContent = cepInput.value;
  }
</script>

<script>
function adicionarCarrinho(nome, preco, qtd){

    let carrinho =
    JSON.parse(
        localStorage.getItem("carrinhoRoyal")
    ) || [];

    const produtoExistente =
    carrinho.find(
        item => item.nome === nome
    );

    if(produtoExistente){

        produtoExistente.quantidade += qtd;

    }else{

        carrinho.push({
            nome: nome,
            preco: preco,
            quantidade: qtd
        });

    }

    localStorage.setItem(
        "carrinhoRoyal",
        JSON.stringify(carrinho)
    );

    alert(nome + " adicionado ao carrinho!");
}

</script>
